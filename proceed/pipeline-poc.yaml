version: 0.0.11

# Cortex: proceed run pipeline-poc.yaml --args gpus=[3] user=0:0 raw_data_root=/vol/cortex/cd4/geffenlab/raw_data processed_data_root=/vol/cortex/cd4/geffenlab/processed_data
# Thinkpad: proceed run proceed/pipeline-poc.yaml --args gpus=false

args:
  raw_data_root: /home/ninjaben/codin/geffen-lab-data/raw_data
  processed_data_root: /home/ninjaben/codin/geffen-lab-data/processed_data
  experimenter: BH
  subject: AS20-minimal3
  date: "03112025"
  user: "self"
  gpus: false

prototype:
  user: $user
  volumes:
    $raw_data_root/$experimenter/$subject/$date: $raw_data_root/$experimenter/$subject/$date
    $processed_data_root/$experimenter/$subject/$date: $processed_data_root/$experimenter/$subject/$date
  working_dir: $processed_data_root/$experimenter/$subject/$date

steps:

  - name: catgt
    image: ghcr.io/benjamin-heasly/geffenlab-spikeglx-tools:v0.0.12
    command: [
      /opt/code/catgt.py,
      $raw_data_root/$experimenter/$subject/$date/ecephys/,
      $processed_data_root/$experimenter/$subject/$date/catgt,
      "-prb_fld",
      "-out_prb_fld",
      "-ni",
      "-ap",
      "-apfilter=butter,12,300,10000",
      "-lffilter=butter,12,1,500",
      "-gblcar",
      "-gfix=0.4,0.1,0.02"
    ]

  - name: kilosort4
    image: ghcr.io/benjamin-heasly/geffenlab-kilosort4:v0.0.2
    gpus: $gpus
    command: [
      --input-dir, "$processed_data_root/$experimenter/$subject/$date/catgt",
      --probe-ids, "imec0", "imec1",
      --ap-meta-pattern, "**/*.ap.meta",
      --kilosort-settings-pattern, "$raw_data_root/$experimenter/$subject/**/*-kilosort4-settings.json",
      --results-dir, $processed_data_root/$experimenter/$subject/$date/kilosort4,
    ]
