# On cortex:
# conda activate geffen-pipelines
# cd geffenlab-ephys-pipeline
# proceed run proceed/ad-onebox.yaml --args experimenter=AD subject=AD025 date="03102026"
# proceed run proceed/ad-onebox.yaml --args experimenter=AD subject=AD025 date="03112026"
version: 0.0.11
args:
  user: "0:0"
  gpus: [3]
  raw_data_root: /vol/cortex/cd4/geffenlab/raw_data
  processed_data_root: /vol/cortex/cd4/geffenlab/processed_data
  experimenter: AD
  subject: AD025
  date: "03102026"
  catgt_args: "-prb_fld -out_prb_fld -ap -ob -obx=0 -apfilter=butter,12,300,9000 -gblcar -gfix=0.40,0.10,0.02 -xd=1,0,13,6,500 -xa=1,0,0,0,0,0 -supercat_skip_ni_ob_bin"
  tprime_to_sync_pattern: "*/*.imec0.ap.*.txt"
  tprime_events_sync_pattern: "*.obx.xd_13_6_500.txt"
  tprim_events_pattern: "*.obx.*.txt"

prototype:
  user: $user
  volumes:
    $raw_data_root/$experimenter/$subject/$date: $raw_data_root/$experimenter/$subject/$date
    $processed_data_root/$experimenter/$subject/$date: $processed_data_root/$experimenter/$subject/$date
  working_dir: $processed_data_root/$experimenter/$subject/$date

steps:

  - name: catgt
    image: ghcr.io/benjamin-heasly/geffenlab-spikeglx-tools:v0.0.16
    command: [
      /opt/code/catgt.py,
      $raw_data_root/$experimenter/$subject/$date/ecephys/,
      $processed_data_root/$experimenter/$subject/$date/catgt,
      $catgt_args
    ]

  - name: kilosort4
    image: ghcr.io/benjamin-heasly/geffenlab-kilosort4:v0.0.3
    gpus: $gpus
    command: [
      --input-dir, "$processed_data_root/$experimenter/$subject/$date/catgt",
      --probe-ids, "imec0", "imec1",
      --ap-meta-pattern, "**/*.ap.meta",
      --kilosort-settings-pattern, "$raw_data_root/$experimenter/$subject/**/*-kilosort4-settings.json",
      --results-dir, $processed_data_root/$experimenter/$subject/$date/kilosort4,
    ]

  - name: tprime
    image: ghcr.io/benjamin-heasly/geffenlab-spikeglx-tools:v0.0.16
    command: [
      /opt/code/tprime.py,
      $processed_data_root/$experimenter/$subject/$date/catgt,
      $processed_data_root/$experimenter/$subject/$date/kilosort4,
      $processed_data_root/$experimenter/$subject/$date/tprime,
      --to-sync-pattern, $tprime_to_sync_pattern,
      --events-sync-pattern, $tprime_events_sync_pattern,
      --events-pattern, $tprim_events_pattern,
      --probe-ids, imec0, imec1,
      --probe-sync-pattern, "*/*.ap.*.txt",
      --probe-spikes-pattern, "*/spike_times.npy",
      --probe-params-pattern, "*/params.py"
    ]

  - name: signal-alignment
    image: ghcr.io/benjamin-heasly/geffenlab-spikeglx-tools:v0.0.16
    command: [
      /opt/code/signal_alignment.py,
      $raw_data_root/$experimenter/$subject/$date/ecephys/,
      $processed_data_root/$experimenter/$subject/$date/catgt,
      $processed_data_root/$experimenter/$subject/$date/signal-alignment,
      --bin-pattern, "*.bin",
      --meta-pattern, "*.meta",
      --to-sync-pattern, $tprime_to_sync_pattern,
      --from-sync-pattern, $tprime_events_sync_pattern,
      --channel-index, 7,
      --channel-name, treadmill
    ]

  - name: bombcell
    image: ghcr.io/benjamin-heasly/geffenlab-bombcell:v0.0.6
    environment:
      LOKY_MAX_CPU_COUNT: "10"
    command: [
      $processed_data_root/$experimenter/$subject/$date/kilosort4,
      --probe-ids, imec0, imec1,
      --probe-params-pattern, "*/params.py",
      --bombcell-params-pattern, "**/*-bombcell-parameters.json"
    ]
